# Copy to .pr-artifacts.yaml and set the referenced environment variables.
storage:
  backend: s3
  bucket: pr-artifacts
  region: us-east-1
  endpoint_url: http://127.0.0.1:9000
  public_base_url: http://127.0.0.1:9000/pr-artifacts
  access_key_id_env: MINIO_ROOT_USER
  secret_access_key_env: MINIO_ROOT_PASSWORD
defaults:
  prefix: local/pr-artifacts
  visibility: signed
  max_bytes: 104857600
  privacy_checks: true
